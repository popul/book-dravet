<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
$for(css)$
  <link rel="stylesheet" href="$css$">
$endfor$
  <style>
    /* Adaptations web */
    body { max-width: 900px; margin: 0 auto; padding: 20px; }
    .title-page { padding-top: 60px; }
    h1 { page-break-before: unset; }
    h2 { page-break-before: unset; }
    nav#TOC { margin-bottom: 40px; border: 1px solid #c9a8e0; padding: 20px; border-radius: 4px; background: #faf5ff; }
    nav#TOC > ul { list-style: none; padding-left: 0; }
    @media (max-width: 768px) {
      body { padding: 10px; }
      nav#TOC { padding: 12px; }
      .title-page { padding-top: 30px; }
    }
  </style>
</head>
<body>
$for(include-before)$
$include-before$
$endfor$
$body$
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    document.querySelectorAll('pre.mermaid').forEach(pre => {
      const code = pre.querySelector('code');
      if (code) {
        pre.textContent = code.textContent;
      }
    });
    mermaid.initialize({ startOnLoad: false, theme: 'base',
      themeVariables: { primaryColor: '#f3ecf8', primaryBorderColor: '#7b2fa0', lineColor: '#7b2fa0' }
    });
    await mermaid.run({ nodes: document.querySelectorAll('pre.mermaid') });
  </script>
</body>
</html>
