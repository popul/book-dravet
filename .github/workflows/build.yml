name: Build PDF

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances systeme (Chromium pour Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Installer md-to-pdf
        run: npm install -g md-to-pdf

      - name: Assembler le markdown
        run: make md

      - name: Generer le PDF
        run: make pdf
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Uploader le PDF
        uses: actions/upload-artifact@v4
        with:
          name: livre-dravet
          path: livre_complet.pdf
