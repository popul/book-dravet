name: Release PDF

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances systeme (Chromium pour Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Installer md-to-pdf et mermaid-cli
        run: |
          npm install -g md-to-pdf
          npm install @mermaid-js/mermaid-cli
          echo "$PWD/node_modules/.bin" >> $GITHUB_PATH

      - name: Construire le livre
        run: make -C livre md && make -C livre pdf
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Construire le Fil d'Ariane
        run: make -C fil-ariane md && make -C fil-ariane pdf
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Syndrome de Dravet — ${{ github.ref_name }}"
          body: |
            Nouvelle version des livrables sur le syndrome de Dravet.

            - **Livre** : Ouvrage de reference (17 chapitres)
            - **Le Fil d'Ariane** : Guide d'action pour l'adulte Dravet en structure

            Telecharger les PDF ci-dessous.
          files: |
            livre/livre_complet.pdf
            fil-ariane/fil_ariane_complet.pdf
          generate_release_notes: true
